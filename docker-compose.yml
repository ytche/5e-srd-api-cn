services:
  db:
    # 使用本地中文 5e-database（原英文镜像已注释）
    build: ../5e-database
    # image: ghcr.io/5e-bits/5e-database:latest
    ports:
      - '27017:27017'
    restart: always

  cache:
    image: redis:6.2.5
    ports:
      - '6379:6379'
    restart: always

  api:
    environment:
      MONGODB_URI: mongodb://db/5e-database
      REDIS_URL: redis://cache:6379
      PORT: 3000
    build: .
    ports:
      - '3000:3000'
    depends_on:
      - db
      - cache
    restart: always
